<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Status - ReliefRoute</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container dashboard-container">
        <!-- Glow accents -->
        <div class="glow green-glow"></div>
        
        <header class="status-header">
            <div class="status-icon-container">
                <i class="ph-fill ph-check-circle success-icon"></i>
            </div>
            <h1 class="heading">Help is on the way</h1>
        </header>

        <!-- Timeline Tracker -->
        <section class="timeline-section">
            <div class="timeline">
                <!-- Step 1 -->
                <div class="timeline-item completed">
                    <div class="timeline-indicator">
                        <i class="ph-fill ph-check"></i>
                    </div>
                    <div class="timeline-content">
                        <h3>Request Received</h3>
                        <p>Your location and needs have been logged</p>
                    </div>
                </div>

                <!-- Step 2 -->
                <div class="timeline-item in-progress">
                    <div class="timeline-indicator">
                        <div class="loader-spinner"></div>
                    </div>
                    <div class="timeline-content">
                        <h3>Resources Being Assigned</h3>
                        <p>AI is allocating nearest available rescue team</p>
                    </div>
                </div>

                <!-- Step 3 -->
                <div class="timeline-item pending">
                    <div class="timeline-indicator"></div>
                    <div class="timeline-content">
                        <h3>Help Dispatched</h3>
                        <p>ETA confirmed: ~12 mins. <a href="dispatch.html" style="color:#00c853; font-weight:700; text-decoration:none; display:block; margin-top:4px;">View Dispatch Details →</a></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Priority Summary Card -->
        <section class="priority-summary-section">
            <div class="glass-card">
                <h2 class="card-title-small">Your Priority List</h2>
                <div class="priority-mini-list" id="mini-list">
                    <!-- Javascript will populate this -->
                </div>
            </div>
        </section>

        <!-- Live Map Section -->
        <section class="live-map-section">
            <div class="map-wrapper">
                <div id="live-map"></div>
                <div class="map-overlay">
                    <span class="team-status">Rescue Team Alpha: Converging</span>
                </div>
            </div>
        </section>

        <footer class="footer-section">
            <button class="secondary-btn" onclick="window.location.href='priority.html'">
                Update My Needs
            </button>
            <button class="primary-btn sos-btn">
                <i class="ph-fill ph-phone-call"></i>
                SOS — Call Emergency
            </button>
        </footer>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
