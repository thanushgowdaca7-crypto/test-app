<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - ReliefRoute</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container login-container">
        <!-- Glow accents -->
        <div class="glow red-glow"></div>
        
        <header class="login-header">
            <div class="logo-shield">
                <i class="ph-fill ph-shield"></i>
                <i class="ph-fill ph-map-pin inner-pin"></i>
            </div>
            <h1 class="app-name">Welcome Back</h1>
            <p class="tagline">Enter your credentials to continue</p>
        </header>

        <main class="login-form-section">
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email or Phone Number</label>
                    <div class="input-wrapper">
                        <i class="ph-bold ph-envelope"></i>
                        <input type="text" id="email" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="ph-bold ph-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="primary-btn login-submit-btn" id="login-btn">
                    Log In
                    <i class="ph-bold ph-sign-in"></i>
                </button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div class="social-login">
                <button class="social-btn">
                    <i class="ph-fill ph-google-logo"></i>
                </button>
                <button class="social-btn">
                    <i class="ph-fill ph-apple-logo"></i>
                </button>
            </div>
        </main>

        <footer class="login-footer">
            <p>Don't have an account? <a href="index.html">Sign Up</a></p>
        </footer>
    </div>
    <script src="login.js"></script>
</body>
</html>
