<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report Disaster - ReliefRoute</title>
    <!-- Use the base styles created previously -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="report.css">
    <!-- Modern Phosphor Icons -->
    <!-- Leaflet.js for accurate map integration -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Modern Phosphor Icons -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container report-container">
        <!-- Background Elements for glassmorphism -->
        <div class="glow red-glow"></div>
        <div class="glow white-glow report-top-glow"></div>
        
        <header class="report-header">
            <h1 class="heading">
                <i class="ph-fill ph-map-pin red-icon title-icon"></i>
                Where are you?
            </h1>
        </header>

        <!-- Large Interactive Map -->
        <section class="map-section">
            <div class="map-container" id="map">
                <!-- Leaflet will inject the map here -->
            </div>
        </section>

        <!-- Disaster Type Selection 2x2 Grid -->
        <section class="disaster-type-section">
            <h2 class="sub-heading">What type of disaster?</h2>
            <div class="disaster-grid">
                <button class="disaster-card" id="type-flood" tabindex="0">
                    <i class="ph ph-waves"></i>
                    <span>Flood</span>
                </button>
                <button class="disaster-card" id="type-earthquake" tabindex="0">
                    <i class="ph ph-activity"></i>
                    <span>Earthquake</span>
                </button>
                <button class="disaster-card" id="type-wildfire" tabindex="0">
                    <i class="ph ph-fire"></i>
                    <span>Wildfire</span>
                </button>
                <button class="disaster-card" id="type-other" tabindex="0">
                    <i class="ph ph-warning"></i>
                    <span>Other</span>
                </button>
            </div>
        </section>

        <!-- Description Block -->
        <section class="description-section">
            <label for="situation-desc" class="sub-heading">
                Describe your situation <span class="optional-text">(optional)</span>
            </label>
            <textarea id="situation-desc" placeholder="E.g. Water level rising, 10 people stranded on rooftop" rows="3"></textarea>
        </section>

        <footer class="footer-section">
            <button class="primary-btn continue-btn" id="next-btn" disabled>
                Next: Set Your Needs
                <i class="ph-bold ph-arrow-right"></i>
            </button>
        </footer>
    </div>
    <script src="report.js"></script>
</body>
</html>
